version: '3.8'

services:
  wachplan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dlrg-wachplan-generator
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
    volumes:
      # Persistente Daten: localStorage, exported files, templates
      - wachplan-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  wachplan-data:
    driver: local
