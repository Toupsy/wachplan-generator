version: '3.9'

services:
  wachplan:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production

    image: dlrg-wachplan-generator:latest
    container_name: dlrg-wachplan-generator

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0

    volumes:
      - wachplan-data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - wachplan-network

    labels:
      description: "DLRG Wachplan-Generator für Wasserrettungsdienste"
      version: "1.0.0"

networks:
  wachplan-network:
    driver: bridge

volumes:
  wachplan-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
