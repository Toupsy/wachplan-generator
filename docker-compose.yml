version: "3.9"

services:
  wachplan:
    image: ghcr.io/toupsy/wachplan-generator:latest
    container_name: dlrg-wachplan
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - wachplan-data:/app/data
    networks:
      - proxy
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  wachplan-admin:
    image: ghcr.io/toupsy/wachplan-generator:latest
    container_name: dlrg-wachplan-admin
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - wachplan-data:/app/data
    networks:
      - proxy
    command: node server/admin-server.js
    environment:
      ADMIN_PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      - wachplan
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true

volumes:
  wachplan-data:
