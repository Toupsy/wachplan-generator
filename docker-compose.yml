version: "3.9"

services:
  wachplan:
    container_name: dlrg-wachplan
    image: ghcr.io/toupsy/wachplan-generator:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - wachplan-data:/app/data
    environment:
      MASTER_SECRET: "cNJqZimlDKRZdTSitVf4b7QllDWXE+FVGGPkhtwNbuw="
      SALT: "cpDzbABAbgU/soUiD2mKFQ=="
      SESSION_SECRET: "u8AWjZf1bkUTgbkQXiBb/Um48gbkRJcbHImxh+skqB4="
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "changeme"

  wachplan-admin:
    container_name: dlrg-wachplan-admin
    image: ghcr.io/toupsy/wachplan-generator:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - wachplan-data:/app/data
    environment:
      ADMIN_PORT: "3001"
      MASTER_SECRET: "cNJqZimlDKRZdTSitVf4b7QllDWXE+FVGGPkhtwNbuw="
      SALT: "cpDzbABAbgU/soUiD2mKFQ=="
      SESSION_SECRET: "u8AWjZf1bkUTgbkQXiBb/Um48gbkRJcbHImxh+skqB4="
      COOKIE_SECURE: "true"
    command: node admin-server.js
    depends_on:
      - wachplan

volumes:
  wachplan-data:
