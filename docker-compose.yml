version: "3.9"

services:
  wachplan:
    container_name: dlrg-wachplan
    image: ghcr.io/toupsy/wachplan-generator:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - wachplan-data:/app/data
    environment:
      MASTER_SECRET: "ERSETZEN_openssl_rand_-base64_32"
      SALT: "ERSETZEN_openssl_rand_-base64_16"
      SESSION_SECRET: "ERSETZEN_openssl_rand_-base64_32"

  wachplan-admin:
    container_name: dlrg-wachplan-admin
    image: ghcr.io/toupsy/wachplan-generator:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - wachplan-data:/app/data
    environment:
      ADMIN_PORT: "3001"
      MASTER_SECRET: "ERSETZEN_openssl_rand_-base64_32"
      SALT: "ERSETZEN_openssl_rand_-base64_16"
      SESSION_SECRET: "ERSETZEN_openssl_rand_-base64_32"
    command: node admin-server.js
    depends_on:
      - wachplan

volumes:
  wachplan-data:
