# ================================================================================
# Cloudflare Workers Configuration
# ================================================================================

name = "dlrg-wachplan-generator"
main = "src/worker.js"
type = "javascript"
account_id = "c305b2e473befd23d3a8cab94cb3483f"
workers_dev = true

# Asset directory (static files from public/)
[assets]
directory = "public/"
binding = "ASSETS"

# ================================================================================
# Production Environment
# ================================================================================
[env.production]
routes = [
  { pattern = "wachplan-generator.de/*", zone_name = "wachplan-generator.de" }
]

[env.production.vars]
ENVIRONMENT = "production"

# ================================================================================
# Development Environment
# ================================================================================
[env.development]

[env.development.vars]
ENVIRONMENT = "development"

# ================================================================================
# Preview Environment (for Pull Requests)
# ================================================================================
[env.preview]

[env.preview.vars]
ENVIRONMENT = "preview"
