# ================================================================================
# Cloudflare Workers Configuration
# ================================================================================

name = "wachplan-generator"
main = "src/worker.js"
account_id = "c305b2e473befd23d3a8cab94cb3483f"
workers_dev = true
compatibility_date = "2026-06-04"

# Asset directory (static files from public/)
[assets]
directory = "public/"
binding = "ASSETS"

# ================================================================================
# Production Environment
# ================================================================================
[env.production]
routes = [
  { pattern = "wachplan-generator.de/*", zone_name = "wachplan-generator.de" }
]

[env.production.vars]
ENVIRONMENT = "production"
ORIGIN_SERVER = "https://wachplan-generator.de"

# ================================================================================
# Development Environment
# ================================================================================
[env.development]

[env.development.vars]
ENVIRONMENT = "development"
DEV_ORIGIN_SERVER = "http://localhost:3000"

# ================================================================================
# Preview Environment (for Pull Requests)
# ================================================================================
[env.preview]

[env.preview.vars]
ENVIRONMENT = "preview"
