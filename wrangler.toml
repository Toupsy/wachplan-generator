name = "dlrg-wachplan-generator"
main = "src/worker.js"
type = "javascript"
account_id = "c305b2e473befd23d3a8cab94cb3483f"
workers_dev = true

# Asset directory configuration
[assets]
directory = "public/"
binding = "ASSETS"

# ─────────────────────────────────────────────────────────────────
# Production Environment
# ─────────────────────────────────────────────────────────────────
[env.production]
routes = [
  { pattern = "wachplan-generator.de/*", zone_name = "wachplan-generator.de" }
]
vars = { ENVIRONMENT = "production" }

[[env.production.kv_namespaces]]
binding = "PLANS_KV"
id = ""
preview_id = ""

# ─────────────────────────────────────────────────────────────────
# Development Environment (local testing)
# ─────────────────────────────────────────────────────────────────
[env.development]
vars = { ENVIRONMENT = "development" }

[[env.development.kv_namespaces]]
binding = "PLANS_KV"
id = ""
preview_id = ""

# ─────────────────────────────────────────────────────────────────
# Preview Environment (Pull Request previews)
# ─────────────────────────────────────────────────────────────────
[env.preview]
vars = { ENVIRONMENT = "preview" }

[[env.preview.kv_namespaces]]
binding = "PLANS_KV"
id = ""
preview_id = ""
