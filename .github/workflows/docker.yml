name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build-and-push

    services:
      wachplan:
        image: ghcr.io/${{ github.repository }}:${{ github.sha }}
        env:
          NODE_ENV: test
          PORT: 3000
          HOST: 0.0.0.0
          MASTER_SECRET: test-secret-very-long-string-32-bytes-12
          SALT: test-salt-long-string-16-bytes
          SESSION_SECRET: test-session-secret-long-string-32-8
        options: >-
          --health-cmd "node -e \"require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})\" "
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
          --health-start-period 10s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for service to be ready
        run: sleep 5

      - name: Test health endpoint
        run: |
          curl -f http://localhost:3000/health || exit 1

      - name: Test auth endpoints
        run: |
          curl -f http://localhost:3000/api/auth/me || exit 1

      - name: Report success
        run: echo "✅ Docker image built and tested successfully"
