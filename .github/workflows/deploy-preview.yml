name: Deploy Preview to Cloudflare Workers

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get branch name
        id: branch
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
            PREVIEW_URL="https://$BRANCH_NAME.wachplan-generator-preview.workers.dev"
          else
            BRANCH_NAME="main"
            PREVIEW_URL="https://wachplan-generator.workers.dev"
          fi
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "is_pr=${{ github.event_name == 'pull_request' }}" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Workers
        run: |
          npx wrangler deploy \
            --env preview \
            --name "wachplan-preview-${{ steps.branch.outputs.branch_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.branch.outputs.preview_url }}';
            const prNumber = context.issue.number;

            const body = `## 🚀 Preview Deployment

Your changes are ready to preview! Test them here:
**[👉 Open Preview](${previewUrl})**

Preview URL: \`${previewUrl}\`

⏱️ Preview environments are cleaned up after PR merge.
            `;

            // Check if comment already exists
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

      - name: Deployment info
        run: |
          echo "✅ Deployment successful!"
          echo "Branch: ${{ steps.branch.outputs.branch_name }}"
          echo "Preview URL: ${{ steps.branch.outputs.preview_url }}"
          if [ "${{ steps.branch.outputs.is_pr }}" == "true" ]; then
            echo "PR Comment will be posted with preview URL"
          fi
